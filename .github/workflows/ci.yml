name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Compilar y ejecutar pruebas
      run: ./mvnw verify --batch-mode

    - name: Subir reportes de tests como artefacto
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: target/surefire-reports/*.xml

    - name: Login en DockerHub
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Construir y subir imagen a DockerHub
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/springuma:latest

    - name: Dar permisos de ejecución a Maven Wrapper
      run: chmod +x mvnw

    - name: Compilar y ejecutar pruebas
      run: ./mvnw verify --batch-mode
    
    - name: Generar Badge de Cobertura con Jacoco
      id: jacoco
      uses: cicirello/jacoco-badge-generator@v2
      with:
        jacoco-csv-file: target/site/jacoco/jacoco.csv
        badges-directory: .github/badges
        generate-branches-badge: true

    - name: Hacer commit de los badges generados
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Autogenerar badges de cobertura"
        file_pattern: ".github/badges/*.svg"
